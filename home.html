<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K@si Web | Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#008CFF">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="style.css?v=11">
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
</head>
<body>
    <h1 class="header-title">Web For Kasi People</h1>

    <div class="container">
        <div class="glass-card login-section" id="authSection">
            <h2 class="typing-text">K@si Web</h2>
            <p class="tagline">Hair cut made easy</p>
            <div class="form-group">
                <input type="email" id="userEmail" placeholder="Email Address" autocomplete="email">
                <input type="password" id="userPass" placeholder="Password" autocomplete="current-password">
                <button type="button" id="mainLoginBtn" class="primary-btn">Login</button>
                <button type="button" id="signupBtn" class="secondary-btn">Sign Up</button>
                <button type="button" id="installBtn" class="secondary-btn" style="display:none;"><i class='bx bx-download'></i> Install App</button>
                <p id="authMsg" style="text-align: center; margin-top: 10px; font-size: 0.9rem; color: #00c853;"></p>
            </div>
        </div>

        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="37BA0E35.jpg" alt="Cut 1" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/008CFF/FFFFFF?text=Fresh+Cut'"></div>
                <div class="swiper-slide"><img src="7847041D.jpg" alt="Cut 2" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/008CFF/FFFFFF?text=Fresh+Cut'"></div>
                <div class="swiper-slide"><img src="8627A569.jpg" alt="Cut 3" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/008CFF/FFFFFF?text=Fresh+Cut'"></div>
                <div class="swiper-slide"><img src="A3886FFD.jpg" alt="Cut 4" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/008CFF/FFFFFF?text=Fresh+Cut'"></div>
                <div class="swiper-slide"><img src="B307F46B.jpg" alt="Cut 5" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/008CFF/FFFFFF?text=Fresh+Cut'"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <div class="mission-box">
            <p>We help you get your fresh haircut and save your time—because we know how it feels to stand in lines all day.</p>
        </div>

        <!-- ELITE CUT SHOWCASE - CLICKABLE -->
        <a href="salons.html" style="text-decoration: none;">
        <div class="glass-card elite-showcase">
            <img src="C00719B.jpg" alt="Elite Cut" loading="lazy" onerror="this.src='https://via.placeholder.com/600x400/7B68EE/FFFFFF?text=Elite+Cut'">
            <div class="elite-text">
                <h3><i class='bx bx-crown'></i> ELITE CUTS ONLY <i class='bx bx-right-arrow-alt'></i></h3>
                <p>Book the freshest fades in the Kasi. No lines. No waiting.</p>
            </div>
        </div>
        </a>

        <div class="nav-grid">
            <a href="cover.html" class="nav-item"><i class='bx bx-home-alt'></i><span>Home</span></a>
            <a href="salons.html" class="nav-item"><i class='bx bx-cut'></i><span>Salons</span></a>
            <button class="nav-item cta-btn" id="adminBtn" style="display: none;"><i class='bx bx-grid-alt'></i><span>Admin</span></button>
            <button class="nav-item" id="logoutBtn" style="display: none;"><i class='bx bx-log-out'></i><span>Logout</span></button>
        </div>
    </div>

    <audio id="loginSound" src="notify.mp3" preload="auto"></audio>
    <audio id="logoutSound" src="success.mp3" preload="auto"></audio>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjmaSIPBngbF3SbhP1AH4Frfn4Mz1QXHk",
        authDomain: "kasi-web-d073f.firebaseapp.com",
        projectId: "kasi-web-d073f",
        storageBucket: "kasi-web-d073f.firebasestorage.app",
        messagingSenderId: "471544855566",
        appId: "1:471544855566:web:aa669a968b8af0ceb6905f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseAuth = auth;
    window.firebaseDB = db;
    window.onAuthState = onAuthStateChanged;
    window.dbDoc = doc;
    window.dbGet = getDoc;
    window.dbSet = setDoc;
    window.logOut = signOut;

    document.addEventListener('DOMContentLoaded', () => {
        const emailInput = document.getElementById('userEmail');
        const passInput = document.getElementById('userPass');
        const mainLoginBtn = document.getElementById('mainLoginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const authMsg = document.getElementById('authMsg');
        const adminBtn = document.getElementById('adminBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginSound = document.getElementById('loginSound');
        const logoutSound = document.getElementById('logoutSound');
        const installBtn = document.getElementById('installBtn');

        loginSound.volume = 0.4;
        logoutSound.volume = 0.4;
        let cachedUserRole = "customer";
        let audioUnlocked = false;
        let deferredPrompt;

        const unlockAudio = () => {
            if(!audioUnlocked) {
                loginSound.play().then(() => {loginSound.pause(); loginSound.currentTime = 0;}).catch(()=>{});
                logoutSound.play().then(() => {logoutSound.pause(); logoutSound.currentTime = 0;}).catch(()=>{});
                audioUnlocked = true;
            }
        }
        document.addEventListener('click', unlockAudio, { once: true });

        if (typeof Swiper!== 'undefined') {
            new Swiper('.swiper', { loop: true, autoplay: { delay: 3000, disableOnInteraction: false }, pagination: { el: '.swiper-pagination', clickable: true } });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authSection').style.display = 'none';
                if (logoutBtn) logoutBtn.style.display = 'block';
                try {
                    const userSnap = await getDoc(doc(db, "users", user.uid));
                    if (userSnap.exists()) { cachedUserRole = userSnap.data().role; } 
                    else { await setDoc(doc(db, "users", user.uid), { email: user.email, role: "customer", createdAt: new Date() }); cachedUserRole = "customer"; }

                    if (adminBtn) {
                        adminBtn.style.display = 'block';
                        const spanEl = adminBtn.querySelector('span');
                        if(cachedUserRole === 'admin') spanEl.textContent = 'Admin Panel';
                        else if(cachedUserRole === 'salon_owner') spanEl.textContent = 'Dashboard';
                        else spanEl.textContent = 'My Bookings';
                    }

                    const justLoggedIn = sessionStorage.getItem('justLoggedIn');
                    if(justLoggedIn === 'true') {
                        sessionStorage.removeItem('justLoggedIn');
                        setTimeout(() => {
                            if (cachedUserRole === 'admin') window.location.href = 'admin.html';
                            else if (cachedUserRole === 'salon_owner') window.location.href = 'owners.html';
                            else window.location.href = 'salons.html';
                        }, 800);
                    } else {
                        authMsg.textContent = `Welcome back ${user.email}`;
                        authMsg.style.color = '#00c853';
                    }
                    
                } catch(err) { console.error(err) }
            } else {
                cachedUserRole = "customer";
                document.getElementById('authSection').style.display = 'block';
                if (logoutBtn) logoutBtn.style.display = 'none';
                if (adminBtn) adminBtn.style.display = 'none';
                authMsg.textContent = "";
            }
        });

        if (mainLoginBtn) mainLoginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim(); const password = passInput.value;
            if (!email ||!password) return alert('Please enter both email and password.');
            mainLoginBtn.innerHTML = `<i class='bx bx-loader bx-spin'></i> Logging in...`;
            mainLoginBtn.disabled = true;
            try {
                sessionStorage.setItem('justLoggedIn', 'true');
                await signInWithEmailAndPassword(auth, email, password);
                unlockAudio(); loginSound.play();
                authMsg.textContent = "Login successful! Redirecting...";
            } catch (err) { 
                sessionStorage.removeItem('justLoggedIn');
                alert('Login Failed: ' + err.message); 
                mainLoginBtn.innerHTML = `Login`;
                mainLoginBtn.disabled = false;
            }
        });

        if (signupBtn) signupBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim(); const password = passInput.value;
            if (!email ||!password) return alert('Please enter email and password.');
            signupBtn.innerHTML = `<i class='bx bx-loader bx-spin'></i> Creating...`;
            signupBtn.disabled = true;
            try {
                sessionStorage.setItem('justLoggedIn', 'true');
                const creds = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", creds.user.uid), { email: email, role: 'customer', createdAt: new Date() });
                unlockAudio(); loginSound.play();
                authMsg.textContent = "Account created! Redirecting...";
            } catch (err) { 
                sessionStorage.removeItem('justLoggedIn');
                alert('Signup Failed: ' + err.message); 
                signupBtn.innerHTML = `Sign Up`;
                signupBtn.disabled = false;
            }
        });

        if (adminBtn) adminBtn.addEventListener('click', () => {
            if(cachedUserRole === 'admin') window.location.href = 'admin.html';
            else if(cachedUserRole === 'salon_owner') window.location.href = 'owners.html';
            else window.location.href = 'salons.html';
        });

        if (logoutBtn) logoutBtn.addEventListener('click', () => { 
            unlockAudio(); logoutSound.play();
            sessionStorage.clear();
            setTimeout(() => {
                signOut(auth).then(() => {
                    window.location.href = 'cover.html'
                })
            }, 400); 
        });
    });
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg => console.log('SW registered:', reg))
      .catch(err => console.log('SW error:', err));
  });
}
</script>
</body>
</html>
