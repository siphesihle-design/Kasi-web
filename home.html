<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K@si Web | Home</title>
    <meta name="theme-color" content="#008CFF">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css?v=12">
</head>
<body>
    <header class="header">
        <h1><i class='bx bx-cut'></i> K@si Web</h1>
        <nav>
            <a href="index.html" class="nav-item"><i class='bx bx-home-alt'></i><span>Home</span></a>
            <a href="salons.html" class="nav-item"><i class='bx bx-store'></i><span>Salons</span></a>
            <a href="#" id="logoutBtn" class="nav-item" style="display:none;"><i class='bx bx-log-out'></i><span>Logout</span></a>
        </nav>
    </header>

    <div class="container">
        <!-- LOGIN CARD -->
        <div id="authContainer" class="glass-card">
            <h2>Welcome Back</h2>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button id="loginBtn" class="primary-btn">Login</button>
            <button id="signupBtn" class="secondary-btn">Sign Up</button>
            <p id="authError" style="color:#ff4757; text-align:center; margin-top:10px;"></p>
        </div>

        <!-- GALLERY / APP CONTENT -->
        <div id="appContent" style="display:none;">
            <div class="glass-card">
                <h2><i class='bx bx-image'></i> Gallery</h2>
                <p>Welcome to K@si Web. Book your next cut with top barbers in Soweto.</p>
                <a href="salons.html" class="primary-btn" style="margin-top:15px; display:block; text-align:center;">Find Salons</a>
            </div>

            <div class="glass-card">
                <h2>Recent Cuts</h2>
                <div id="galleryGrid" style="display:grid; grid-template-columns:repeat(2, 1fr); gap:10px;">
                    <img src="https://placehold.co/200x200/008CFF/FFF?text=Fade" style="width:100%; border-radius:10px;">
                    <img src="https://placehold.co/200x200/FF4D00/FFF?text=Line+Up" style="width:100%; border-radius:10px;">
                    <img src="https://placehold.co/200x200/1a1a2e/FFF?text=Beard" style="width:100%; border-radius:10px;">
                    <img src="https://placehold.co/200x200/00c853/FFF?text=Full+Cut" style="width:100%; border-radius:10px;">
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjmaSIPBngbF3SbhP1AH4Frfn4Mz1QXHk",
            authDomain: "kasi-web-d073f.firebaseapp.com",
            projectId: "kasi-web-d073f",
            storageBucket: "kasi-web-d073f.firebasestorage.app",
            messagingSenderId: "471544855566",
            appId: "1:471544855566:web:aa669a968b8af0ceb6905f"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDB = db;
        window.logOut = signOut;
        window.onAuthState = onAuthStateChanged;
        window.dbDoc = doc;
        window.dbSet = setDoc;

        const authContainer = document.getElementById('authContainer');
        const appContent = document.getElementById('appContent');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const authError = document.getElementById('authError');

        onAuthState(auth, (user) => {
            if (user) {
                authContainer.style.display = 'none';
                appContent.style.display = 'block';
                logoutBtn.style.display = 'flex';
            } else {
                authContainer.style.display = 'block';
                appContent.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        });

        loginBtn.addEventListener('click', () => {
            signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
                .catch(err => authError.textContent = err.message);
        });

        signupBtn.addEventListener('click', async () => {
            try {
                const cred = await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
                await setDoc(doc(db, "users", cred.user.uid), {
                    email: emailInput.value,
                    role: 'customer',
                    createdAt: new Date()
                });
            } catch (err) {
                authError.textContent = err.message;
            }
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = 'index.html' // Go back to cover
            });
        });
    </script>
</body>
</html>
