<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>K@si Web | Owner Dashboard</title>
    <meta name="theme-color" content="#7B68EE">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css?v=14">
</head>
<body>
    <header class="header">
        <h1><i class='bx bx-store'></i> Owner Dashboard</h1>
        <nav>
            <a href="index.html" class="nav-item"><i class='bx bx-home-alt'></i><span>Home</span></a>
            <a href="#" id="logoutBtn" class="nav-item"><i class='bx bx-log-out'></i><span>Logout</span></a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-card">
            <h2>Today's Bookings</h2>
            <p id="todayDate" style="color:#B0B0D0; margin-bottom:15px;"></p>
            <div id="ownerBookings" style="display:flex; flex-direction:column; gap:15px;">
                <p style="text-align:center; color:#888;">Loading bookings...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjmaSIPBngbF3SbhP1AH4Frfn4Mz1QXHk",
            authDomain: "kasi-web-d073f.firebaseapp.com",
            projectId: "kasi-web-d073f",
            storageBucket: "kasi-web-d073f.firebasestorage.app",
            messagingSenderId: "471544855566",
            appId: "1:471544855566:web:aa669a968b8af0ceb6905f"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ownerBookings = document.getElementById('ownerBookings');
        const logoutBtn = document.getElementById('logoutBtn');
        const todayDate = document.getElementById('todayDate');
        const notifySound = new Audio('notify.mp3'); notifySound.volume = 0.4;

        todayDate.textContent = new Date().toLocaleDateString('en-ZA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        let currentOwnerUid = null;
        let ownerSalonId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentOwnerUid = user.uid;
                // 1. Check if this user is a salon_owner and get their salonId
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if(!userSnap.exists() || userSnap.data().role!== 'salon_owner') {
                    alert("Access Denied. You are not a salon owner.");
                    window.location.href = 'home.html';
                    return;
                }
                ownerSalonId = userSnap.data().salonId; // IMPORTANT: Add salonId to user doc in Firestore

                // 2. Listen for bookings for this salon ONLY
                const today = new Date().toISOString().split('T')[0];
                const q = query(collection(db, "bookings"),
                    where("s", "==", ownerSalonId),
                    where("date", "==", today),
                    orderBy("createdAt", "desc")
                );

                let firstLoad = true;
                onSnapshot(q, (snapshot) => {
                    if(!firstLoad && snapshot.docChanges().some(change => change.type === 'added')) {
                        notifySound.play().catch(()=>{});
                    }
                    firstLoad = false;
                    renderBookings(snapshot);
                });

            } else {
                window.location.href = 'home.html';
            }
        });

        function renderBookings(snapshot) {
            if(snapshot.empty) {
                ownerBookings.innerHTML = `<p style="text-align:center; color:#888;">No bookings for today 💈</p>`;
                return;
            }
            ownerBookings.innerHTML = "";
            snapshot.forEach(docSnap => {
                const b = docSnap.data();
                const id = docSnap.id;
                const statusColor = b.status === 'approved'? '#00c853' : b.status === 'pending'? '#FFA500' : '#ff4757';

                ownerBookings.innerHTML += `
                <div class="glass-card" style="padding:15px; border-left:4px solid ${statusColor};">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3 style="margin:0;">${b.name}</h3>
                        <span style="background:${statusColor}; padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:700;">${b.status.toUpperCase()}</span>
                    </div>
                    <p><i class='bx bx-cut'></i> ${b.service}</p>
                    <p><i class='bx bx-time'></i> ${b.time}</p>
                    <p><i class='bx bx-phone'></i> ${b.phone}</p>

                    ${b.status === 'pending'? `
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <button class="primary-btn approveBtn" data-id="${id}" style="flex:1;">Approve</button>
                        <button class="secondary-btn declineBtn" data-id="${id}" style="flex:1;">Decline</button>
                    </div>
                    ` : b.status === 'approved'? `
                    <button class="primary-btn doneBtn" data-id="${id}" style="margin-top:10px; width:100%;">Mark as Done</button>
                    ` : ''}
                </div>`;
            });
        }

        // BUTTON CLICKS
        document.addEventListener('click', async (e) => {
            const approveBtn = e.target.closest('.approveBtn');
            const declineBtn = e.target.closest('.declineBtn');
            const doneBtn = e.target.closest('.doneBtn');

            if(approveBtn) await updateDoc(doc(db, "bookings", approveBtn.dataset.id), { status: "approved" });
            if(declineBtn) await updateDoc(doc(db, "bookings", declineBtn.dataset.id), { status: "declined" });
            if(doneBtn) await updateDoc(doc(db, "bookings", doneBtn.dataset.id), { status: "done" });
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'index.html')
        });
    </script>
</body>
</html>
