<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K@si Web | Workspace Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --admin-teal: #008080;
            --admin-bg: #0a0a0a;
            --card-bg: rgba(26, 26, 26, 0.95);
            --text-muted: #888;
        }
        body {
            background-color: var(--admin-bg);
        }
        /* Dashboard custom overrides ensuring seamless style alignments */
        .dashboard-wrapper {
            width: 100%;
            max-width: 900px !important; /* Forces layout tracking breakout past normal phone scales */
            margin: auto;
            padding: 20px;
        }
        .status-control {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status-control h3 { margin: 0; font-size: 1rem; }
        .status-select {
            background: #141414;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            outline: none;
            width: auto;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--admin-teal);
        }
        .stat-card h3 { margin: 0; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card p { margin: 8px 0 0; font-size: 1.8rem; font-weight: 800; color: #fff; }
        
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th {
            background-color: #141414;
            padding: 18px 20px;
            font-size: 0.85rem;
            color: var(--admin-teal);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td { padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        
        .status-btn {
            background: var(--admin-teal);
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.2s;
            width: auto;
        }
        .status-btn:hover { background: #006666; transform: translateY(-1px); }
        .clear-btn {
            background: transparent;
            color: #ff4757;
            border: 1px solid #ff4757;
            padding: 14px;
            margin-top: 25px;
            cursor: pointer;
            border-radius: 14px;
            width: 100%;
            font-weight: bold;
            transition: 0.2s;
        }
        .clear-btn:hover { background: #ff4757; color: white; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: var(--admin-teal); }
        
        @media (max-width: 600px) {
            table { font-size: 0.85rem; }
            th, td { padding: 14px 10px; }
            .stat-card p { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="container dashboard-wrapper">
    <header style="margin: 20px 0 30px 0;">
        <h1 id="dashboardTitle" class="header-title" style="text-align: left; margin-top: 0;">Barber Dashboard</h1>
        <p id="dashboardSubtitle" class="tagline" style="text-align: left; margin-bottom: 0;">Manage your hustle for today</p>
    </header>

    <div id="statusControlBox" class="status-control">
        <h3><i class='bx bx-store'></i> Shop Status</h3>
        <select id="shopStatusSelect" class="status-select">
            <option value="Open">🟢 Open Now</option>
            <option value="Busy">🔴 Busy</option>
            <option value="Closed">⚫ Closed</option>
        </select>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <h3>Total Bookings</h3>
            <p id="totalCount">0</p>
        </div>
        <div class="stat-card">
            <h3>Next Appointment</h3>
            <p id="nextTime">--:--</p>
        </div>
        <div class="stat-card">
            <h3 id="revenueLabel">Est. Revenue</h3>
            <p id="totalRevenue">R0</p>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="bookingsTable">
            <thead>
                <tr>
                    <th>Customer</th>
                    <th>Time</th>
                    <th>Service</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" style="text-align:center; color:#666; padding: 30px;">Authenticating workspace session...</td></tr>
            </tbody>
        </table>
    </div>

    <button class="clear-btn" id="clearBtn">Clear All Appointments</button>
    <button class="clear-btn" id="logoutBtnOwner" style="background:#1a1a1a; border-color:rgba(255,255,255,0.1); color:#fff; margin-top: 12px;">Logout from Session</button>
    <a href="index.html" class="back-link">← Return Home</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { 
        getAuth, 
        onAuthStateChanged, 
        signOut 
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { 
        getFirestore, doc, setDoc, getDoc, addDoc, collection, deleteDoc, onSnapshot,
        query, orderBy, where 
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    // Official production configuration parameters matching your project credentials
    const firebaseConfig = {
        apiKey: "AIzaSyCjmaSIPBngbF3SbhP1AH4Frfn4Mz1QXHk",
        authDomain: "kasi-web-d073f.firebaseapp.com",
        databaseURL: "https://kasi-web-d073f-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kasi-web-d073f",
        storageBucket: "kasi-web-d073f.firebasestorage.app",
        messagingSenderId: "471544855566",
        appId: "1:471544855566:web:aa669a968b8af0ceb6905f",
        measurementId: "G-Q8QVN2T54S"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Global variable mapping bindings for external script context processing
    window.firebaseAuth = auth;
    window.firebaseDB = db;
    window.onAuthState = onAuthStateChanged;
    window.logOut = signOut;
    
    window.dbDoc = doc;
    window.dbSet = setDoc;
    window.dbGet = getDoc;
    window.addDoc = addDoc;
    window.collection = collection;
    window.removeDoc = deleteDoc;
    window.onSnapshot = onSnapshot;
    window.query = query;
    window.orderBy = orderBy;
    window.where = where;
</script>

<script src="admin-dashboard.js"></script>
</body>
</html>
