<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K@si Web | Admin Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="header-title">Admin Dashboard</h1>

    <div class="container">
        <div class="glass-card">
            <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Master Bookings Overview</h2>
                <button class="secondary-btn" id="logoutBtn" style="width:auto; padding:8px 16px;">
                    <i class='bx bx-log-out'></i> Logout
                </button>
            </div>
            <p class="tagline" id="bookingCount">Loading...</p>
            
            <div id="bookingsList" class="bookings-list">
            </div>
        </div>

        <div class="nav-grid">
            <a href="index.html" class="nav-item"><i class='bx bx-home-alt'></i><span>Home</span></a>
            <a href="salons.html" class="nav-item"><i class='bx bx-cut'></i><span>Salons</span></a>
            <a href="admin.html" class="nav-item active"><i class='bx bx-grid-alt'></i><span>Admin</span></a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { 
            getFirestore, doc, setDoc, getDoc, addDoc, collection, deleteDoc, onSnapshot,
            query, orderBy, where 
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        // Official operational setup configuration matching your project credentials
        const firebaseConfig = {
            apiKey: "AIzaSyCjmaSIPBngbF3SbhP1AH4Frfn4Mz1QXHk",
            authDomain: "kasi-web-d073f.firebaseapp.com",
            databaseURL: "https://kasi-web-d073f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kasi-web-d073f",
            storageBucket: "kasi-web-d073f.firebasestorage.app",
            messagingSenderId: "471544855566",
            appId: "1:471544855566:web:aa669a968b8af0ceb6905f",
            measurementId: "G-Q8QVN2T54S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
      
        // Admin Access Route Protection Guard
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // Not logged in -> boot to home page
                window.location.replace("index.html");
                return;
            }
            
            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    // If they aren't the Master Admin, redirect them away immediately
                    if (userData.role !== 'admin') {
                        alert("Access Denied: Master Admins Only.");
                        window.location.replace("index.html");
                    }
                } else {
                    window.location.replace("index.html");
                }
            } catch (error) {
                console.error("Route verification failed:", error);
                window.location.replace("index.html");
            }
        });

        // Expose correct Cloud Firestore global mappings for administrative script integration paths
        window.firebaseAuth = auth;
        window.firebaseDB = db;
        window.onAuthState = onAuthStateChanged;
        window.logOut = signOut;
        
        window.dbDoc = doc;
        window.dbSet = setDoc;
        window.dbGet = getDoc;
        window.addDoc = addDoc;
        window.collection = collection;
        window.removeDoc = deleteDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.where = where;
    </script>
    <script src="script.js"></script>
</body>
</html>
