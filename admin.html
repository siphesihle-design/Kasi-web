<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K@si Web | Admin</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css?v=14">
    <style>
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-bottom:20px; }
        .stat-card { text-align:center; padding:15px; }
        .stat-card h3 { font-size:1.8rem; color:#7B68EE; margin:0; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:12px; text-align:left; border-bottom:1px solid rgba(123,104,238,0.2); }
        .status-pill { padding:5px 10px; border-radius:20px; font-size:0.8rem; font-weight:700; }
        .status-pending { background:rgba(255,165,0,0.2); color:#FFA500; }
        .status-approved { background:rgba(0,200,83,0.2); color:#00c853; }
        .status-completed { background:rgba(123,104,238,0.2); color:#7B68EE; }
        .status-btn { padding:6px 12px; border:none; border-radius:8px; background:#7B68EE; color:#fff; cursor:pointer; }
    </style>
</head>
<body>
    <header class="header">
        <h1 id="dashboardTitle"><i class='bx bx-bar-chart'></i> Dashboard</h1>
        <nav>
            <a href="index.html" class="nav-item"><i class='bx bx-home-alt'></i><span>Home</span></a>
            <button id="clearBtn" class="nav-item" style="background:none; border:none; color:#ff4757;"><i class='bx bx-trash'></i><span>Clear</span></button>
            <a href="#" id="logoutBtnAdmin" class="nav-item"><i class='bx bx-log-out'></i><span>Logout</span></a>
        </nav>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="glass-card stat-card"><h3 id="totalCount">0</h3><p>Total</p></div>
            <div class="glass-card stat-card"><h3 id="pendingCount">0</h3><p>Pending</p></div>
            <div class="glass-card stat-card"><h3 id="completedCount">0</h3><p>Done</p></div>
            <div class="glass-card stat-card"><h3 id="totalRevenue">R0</h3><p>Revenue</p></div>
        </div>
        <div class="glass-card">
            <h2>Next Booking: <span id="nextTime">--:--</span></h2>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Salon</th><th>Customer</th><th>Time</th><th>Service</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
