<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K@si Salons | Find a Barber</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header" style="padding-top: 20px;">
        <div class="container header-nav-box">
            <h1 class="header-title" style="text-align:left; margin-top: 20px;">Local Salons</h1>
            <p class="tagline" id="bookingsToday" style="text-align:left; margin-top: 5px;">Loading stats...</p>
            <p class="tagline" style="text-align:left; margin-top: -15px;">Top-rated barbers in your area.</p>
        </div>
    </header>

    <main class="container">
        <div class="salon-list">
            <div class="glass-card salon-card">
                <div class="card-media">
                    <span id="status-vaal" class="status-badge">Open Now</span>
                    <img src="9C00E0.jpeg" alt="Vaal Fresh" class="salon-img">
                    <div class="img-overlay"></div>
                </div>
                <div class="card-content">
                    <div class="card-header">
                        <h2>Vaal Fresh Barbers</h2>
                        <div class="rating"><i class='bx bxs-star'></i> 4.9</div>
                    </div>
                    <p class="description">Specializing in clean fades, sharp lines, and beard grooming.</p>
                    <div class="feature-tags">
                        <span><i class='bx bx-time'></i> 15 min wait</span>
                        <span id="dist-vaal"><i class='bx bx-map'></i> Calculating...</span>
                    </div>
                    <button type="button" class="primary-btn openBooking"
                            data-salon="Vaal Fresh Barbers"
                            data-salon-uid="PASTE_VAAL_OWNER_UID_HERE">
                        Book Appointment
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div class="modal" id="bookingModal">
        <div class="modal-overlay" onclick="document.getElementById('bookingModal').classList.remove('active')"></div>
        <div class="glass-card modal-content">
            <div class="modal-header">
                <h2 style="margin:0; font-size:1.4rem;">Secure Booking Slot</h2>
                <button type="button" class="close-btn" onclick="document.getElementById('bookingModal').classList.remove('active')">&times;</button>
            </div>
            <form id="bookingForm">
                <div class="form-group">
                    <label style="font-size: 0.85rem; color: #888;">Select Service</label>
                    <select id="serviceType" required>
                        <option value="Fresh Fade haircut (R80)">Fresh Fade (R80)</option>
                        <option value="Chiskop Clean shave (R50)">Chiskop Shave (R50)</option>
                        <option value="Beard Trim & Shape (R40)">Beard Trim & Shape (R40)</option>
                        <option value="Combo Cut and Beard (R110)">Combo Cut & Beard (R110)</option>
                    </select>

                    <label style="font-size: 0.85rem; color: #888;">Your Full Name</label>
                    <input type="text" id="custName" placeholder="e.g. Sipho" required>

                    <label style="font-size: 0.85rem; color: #888;">Phone Number</label>
                    <input type="tel" id="custPhone" placeholder="e.g. 0712345678" required>

                    <label style="font-size: 0.85rem; color: #888;">Preferred Arrival Time</label>
                    <input type="time" id="custTime" required>

                    <button type="submit" class="primary-btn" style="margin-top: 10px;">Confirm Booking</button>
                </div>
            </form>
        </div>
    </div>

    <div class="nav-grid">
        <a href="index.html" class="nav-item"><i class='bx bx-home-alt'></i><span>Home</span></a>
        <a href="salons.html" class="nav-item active"><i class='bx bx-cut'></i><span>Salons</span></a>
        <button class="nav-item cta-btn" id="adminBtn" style="display: none;"><i class='bx bx-grid-alt'></i><span>Dashboard</span></button>
        <button class="nav-item" id="logoutBtn" style="display: none;"><i class='bx bx-log-out'></i><span>Logout</span></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
