<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K@si Salons | Find a Barber</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css?v=10">
</head>
<body>
    <header class="main-header">
        <div class="container header-nav-box">
            <h1 class="header-title">Local Salons</h1>
            <p class="tagline" id="bookingsToday">Finding fresh cuts near you...</p>
        </div>
    </header>

    <main class="container">
        <!-- SEARCH BAR -->
        <div class="glass-card" style="padding:15px; margin-bottom:20px;">
            <div style="display:flex; gap:8px;">
                <input type="text" id="searchBar" placeholder="Search salons, location, services..." style="flex:1;">
                <button id="searchBtn" class="secondary-btn" style="width:auto; padding:12px;"><i class='bx bx-search'></i></button>
            </div>
        </div>

        <div class="salon-list" id="salonList"></div>
    </main>

    <!-- BOOKING MODAL -->
    <div class="modal" id="bookingModal">
        <div class="modal-overlay" onclick="bookingModal.classList.remove('active')"></div>
        <div class="modal-content glass-card">
            <div class="modal-header"><h2>Schedule Trim</h2><button type="button" class="close-btn" onclick="bookingModal.classList.remove('active')">&times;</button></div>
            <form id="bookingForm" class="form-group">
                <select id="serviceType" required>
                    <option value="Standard Haircut (R100)">Standard Haircut — R100</option>
                    <option value="Fade & Beard Trim (R150)">Fade & Beard Trim — R150</option>
                    <option value="Chiskop Clean Treatment (R80)">Chiskop Clean Treatment — R80</option>
                </select>
                <input type="text" id="custName" placeholder="Your Name" required>
                <input type="tel" id="custPhone" placeholder="Phone Number" required>
                <input type="time" id="custTime" required>
                <button type="submit" class="primary-btn">Confirm & Place Entry</button>
            </form>
        </div>
    </div>

    <nav class="nav-grid">
        <a href="cover.html" class="nav-item"><i class='bx bx-home-alt'></i><span>Home</span></a>
        <a href="salons.html" class="nav-item active"><i class='bx bx-cut'></i><span>Salons</span></a>
        <button type="button" class="nav-item cta-btn" id="adminBtn" style="display: none;"><i class='bx bx-grid-alt'></i><span>Dashboard</span></button>
        <button type="button" class="nav-item" id="logoutBtn" style="display: none;"><i class='bx bx-log-out'></i><span>Logout</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, addDoc, collection, onSnapshot, query, orderBy, where, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCjmaSIPBngbF3SbhP1AH4Frfn4Mz1QXHk",
            authDomain: "kasi-web-d073f.firebaseapp.com",
            projectId: "kasi-web-d073f",
            appId: "1:471544855566:web:aa669a968b8af0ceb6905f"
        };
        const app = initializeApp(firebaseConfig); 
        const auth = getAuth(app); 
        const db = getFirestore(app);

        window.firebaseAuth = auth; 
        window.firebaseDB = db;
        window.onAuthState = onAuthStateChanged; 
        window.logOut = signOut;
        window.dbDoc = doc; 
        window.dbGet = getDoc; 
        window.addDoc = addDoc; 
        window.collection = collection; 
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.where = where;
        window.updateDoc = updateDoc;
        window.dbSet = setDoc;
    </script>
    <script src="script.js?v=3"></script>
</body>
</html>
