<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K@si Web | Welcome</title>
    <link rel="stylesheet" href="style.css">
    <style>
       .cover-container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; background: linear-gradient(135deg, #0a0a0a, #1a1a2e); }
       .cover-logo { width: 300px; max-width: 80%; border-radius: 24px; margin-bottom: 30px; box-shadow: 0 0 40px rgba(0, 140, 255, 0.3); }
       .typing-text { font-size: 2.5rem; font-weight: 800; color: #008CFF; margin-bottom: 10px; }
       .tagline { font-size: 1.1rem; color: #888; margin-bottom: 40px; }
       .primary-btn { font-size: 1.1rem; padding: 16px 40px; }
    </style>
</head>
<body>
    <div class="cover-container">
        <img src="683B4C35-1E45-4922-9A56-56BDD423D1F2.jpeg" alt="K@si Web" class="cover-logo">
        <h1 class="typing-text">K@si Web</h1>
        <p class="tagline">Hair cut made easy</p>
        <button id="getStartedBtn" class="primary-btn">Get Started</button>
    </div>

    <audio id="clickSound" src="mixkit-select-click-1109.wav" preload="auto"></audio>

    <script>
        const getStartedBtn = document.getElementById('getStartedBtn');
        const clickSound = document.getElementById('clickSound');
        clickSound.volume = 0.6;
        clickSound.playbackRate = 1.2; // FASTER CLICK

        // UNLOCK AUDIO ON FIRST TOUCH FOR MOBILE
        document.addEventListener('touchstart', () => {
            clickSound.play().then(() => {clickSound.pause(); clickSound.currentTime = 0;}).catch(()=>{});
        }, { once: true });

        getStartedBtn.addEventListener('click', (e) => {
            e.preventDefault();
            clickSound.currentTime = 0; // RESET
            clickSound.play().catch(e => console.log("Cover sound error:", e)); // PLAY INSTANT
            if(navigator.vibrate) navigator.vibrate(30); // SHORTER VIBRATION
            window.location.href = 'home.html'; // NO DELAY
        });
    </script>
</body>
</html>
