<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K@si Web | Home</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="header-title">Web For Kasi People</h1>

    <div class="container">
        <div class="glass-card login-section">
            <h2 class="typing-text">K@si Web</h2>
            <p class="tagline">Hair cut made easy</p>

            <div class="form-group">
                <input type="email" id="userEmail" placeholder="Email Address" autocomplete="email">
                <input type="password" id="userPass" placeholder="Password" autocomplete="current-password">
                <button type="button" id="mainLoginBtn" class="primary-btn">Login</button>
                <button type="button" id="signupBtn" class="secondary-btn">Sign Up</button>
                <p id="authMsg"></p>
            </div>
        </div>

        <!-- Swiper for haircuts -->
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="37BA0E35.jpg" alt="Cut 1"></div>
                <div class="swiper-slide"><img src="7847041D.jpg" alt="Cut 2"></div>
                <div class="swiper-slide"><img src="8627A569.jpg" alt="Cut 3"></div>
                <div class="swiper-slide"><img src="A3886FFD.jpg" alt="Cut 4"></div>
                <div class="swiper-slide"><img src="B307F46B.jpg" alt="Cut 5"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <div class="mission-box">
            <p>We help you get your fresh haircut and save your time—because we know how it feels to stand in lines all day.</p>
        </div>

        <div class="nav-grid">
            <a href="index.html" class="nav-item active"><i class='bx bx-home-alt'></i><span>Home</span></a>
            <a href="salons.html" class="nav-item"><i class='bx bx-cut'></i><span>Salons</span></a>
            <button class="nav-item cta-btn" id="adminBtn"><i class='bx bx-grid-alt'></i><span>Admin</span></button>
            <button class="nav-item" id="logoutBtn" style="display:none;"><i class='bx bx-log-out'></i><span>Logout</span></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <!-- Firebase SDKs - put this at bottom of body -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { 
        getAuth, 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword, 
        onAuthStateChanged, 
        signOut 
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { getDatabase, ref, set, get, push, remove, onValue } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCjmaSIPBngbF3SbhP1AH4Frfn4Mz1QXHk",
        authDomain: "kasi-web-d073f.firebaseapp.com",
        projectId: "kasi-web-d073f",
        storageBucket: "kasi-web-d073f.appspot.com",
        messagingSenderId: "471544855566",
        appId: "1:471544855566:web:6047dd0119c5e305b6905f",
        measurementId: "G-L6JYY1G97T"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getDatabase(app);
      
      // Expose to window so script.js can use them
      window.firebaseAuth = auth;
      window.firebaseDB = db;
      window.signIn = signInWithEmailAndPassword;
      window.signUp = createUserWithEmailAndPassword;
      window.onAuthState = onAuthStateChanged;
      window.logOut = signOut;
      window.dbRef = ref;
      window.dbSet = set;
      window.dbGet = get;
      window.push = push;
      window.remove = remove;
      window.onValue = onValue;
    </script>
    
    <script src="script.js"></script>
</body>
</html>
